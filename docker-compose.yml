version: "3.8"

services:
  # 1️⃣ MinIO - Data Lake (Bronze/Silver/Gold)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    volumes:
      - minio_data:/data
    restart: always   

  # 2️⃣ PostgreSQL - Metadata cho Superset (và có thể dùng làm Gold)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: metastore
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always   

  # 3️⃣ Jupyter + PySpark + Delta Lake
  jupyter:
    image: jupyter/pyspark-notebook:latest
    command: start-notebook.sh --NotebookApp.token=lab
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=lab
      - SPARK_OPTS=--packages io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data_raw:/home/jovyan/data_raw
    depends_on:
      - minio
      - postgres
    restart: always   

  # 4️⃣ Apache Superset - Dashboard BI
  superset:
    image: apache/superset:latest
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "secretkey"
    depends_on:
      - jupyter
      - postgres
    volumes:
      - superset_home:/app/superset_home
    restart: always   

volumes:
  minio_data:
  pg_data:
  superset_home:
